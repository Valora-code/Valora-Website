# GitHub Pages deployment for a Vite + React app.
# Follows https://vite.dev/guide/static-deploy (build dist, upload artifact, deploy-pages).
# Never publish the repo root: dev index.html loads /src/main.tsx (wrong MIME on Pages).
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Repository secret: Clerk Dashboard → API Keys → Publishable key (same instance as Waitlist).
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          # Optional: override app origin for “Already have an account?” sign-in link (default in code: https://app.valora-tech.com).
          VITE_VALORA_APP_ORIGIN: ${{ secrets.VITE_VALORA_APP_ORIGIN }}
        run: npm run build

      - name: Verify dist is a production bundle (not dev index.html)
        run: |
          if grep -q 'src/main.tsx' dist/index.html; then
            echo "ERROR: dist/index.html still references /src/main.tsx — build misconfigured."
            exit 1
          fi
          if ! grep -qE '/assets/[^"]+\.js' dist/index.html; then
            echo "ERROR: dist/index.html has no /assets/*.js script tag."
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
