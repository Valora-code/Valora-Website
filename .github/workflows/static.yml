# Build with Vite and deploy the production bundle to GitHub Pages.
# Do not upload the repo root: dev index.html loads /src/main.tsx, which Pages serves as application/octet-stream.
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify dist is a production bundle (not dev index.html)
        run: |
          if grep -q 'src/main.tsx' dist/index.html; then
            echo "ERROR: dist/index.html still references /src/main.tsx — build misconfigured."
            exit 1
          fi
          if ! grep -qE '/assets/[^"]+\.js' dist/index.html; then
            echo "ERROR: dist/index.html has no /assets/*.js script tag."
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
